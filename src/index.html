<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Pendulum Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        header {
            text-align: center;
            padding: 10px;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }

        .canvas-container {
            position: relative;
            flex: 1;
            min-height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        #pendulumCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 100px;
            flex: 1;
            max-width: 150px;
        }

        .control-group label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            cursor: pointer;
        }

        .control-group .value {
            font-size: 0.85rem;
            color: #48dbfb;
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-width: 80px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .energy-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
        }

        .energy-title {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }

        .energy-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .energy-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .energy-label {
            font-size: 0.75rem;
            width: 60px;
            text-align: right;
        }

        .energy-bar-container {
            flex: 1;
            height: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            overflow: hidden;
        }

        .energy-bar {
            height: 100%;
            border-radius: 6px;
            transition: width 0.1s ease;
        }

        .energy-bar.kinetic {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
        }

        .energy-bar.potential {
            background: linear-gradient(90deg, #48dbfb, #0abde3);
        }

        .energy-bar.total {
            background: linear-gradient(90deg, #feca57, #ff9f43);
        }

        .energy-value {
            font-size: 0.75rem;
            width: 50px;
            text-align: left;
            color: #888;
        }

        @media (min-width: 768px) {
            .main-content {
                flex-direction: row;
            }

            .canvas-container {
                flex: 2;
                min-height: 400px;
            }

            .side-panel {
                flex: 1;
                max-width: 300px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .control-group {
                max-width: none;
            }
        }

        @media (max-aspect-ratio: 9/16) {
            .container {
                padding: 5px;
            }

            .canvas-container {
                min-height: 50vh;
            }

            .control-group {
                min-width: 80px;
            }

            button {
                padding: 8px 12px;
                font-size: 0.8rem;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Double Pendulum</h1>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="pendulumCanvas"></canvas>
            </div>

            <div class="side-panel">
                <div class="controls-panel">
                    <div class="control-row">
                        <div class="control-group">
                            <label>L1 (Length 1)</label>
                            <input type="range" id="length1" min="50" max="200" value="120">
                            <span class="value" id="length1Value">120</span>
                        </div>
                        <div class="control-group">
                            <label>L2 (Length 2)</label>
                            <input type="range" id="length2" min="50" max="200" value="120">
                            <span class="value" id="length2Value">120</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-group">
                            <label>m1 (Mass 1)</label>
                            <input type="range" id="mass1" min="5" max="50" value="20">
                            <span class="value" id="mass1Value">20</span>
                        </div>
                        <div class="control-group">
                            <label>m2 (Mass 2)</label>
                            <input type="range" id="mass2" min="5" max="50" value="20">
                            <span class="value" id="mass2Value">20</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-group">
                            <label>θ1 (Angle 1)</label>
                            <input type="range" id="angle1" min="-180" max="180" value="90">
                            <span class="value" id="angle1Value">90°</span>
                        </div>
                        <div class="control-group">
                            <label>θ2 (Angle 2)</label>
                            <input type="range" id="angle2" min="-180" max="180" value="90">
                            <span class="value" id="angle2Value">90°</span>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="control-group">
                            <label>Gravity</label>
                            <input type="range" id="gravity" min="0.1" max="3" step="0.1" value="1">
                            <span class="value" id="gravityValue">1.0</span>
                        </div>
                        <div class="control-group">
                            <label>Speed</label>
                            <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1">
                            <span class="value" id="speedValue">1.0x</span>
                        </div>
                    </div>

                    <div class="buttons">
                        <button id="pauseBtn">Pause</button>
                        <button id="resetBtn">Reset</button>
                        <button id="clearTrailBtn">Clear Trail</button>
                    </div>
                </div>

                <div class="energy-panel">
                    <div class="energy-title">Energy</div>
                    <div class="energy-bars">
                        <div class="energy-item">
                            <span class="energy-label">Kinetic</span>
                            <div class="energy-bar-container">
                                <div class="energy-bar kinetic" id="kineticBar"></div>
                            </div>
                            <span class="energy-value" id="kineticValue">0</span>
                        </div>
                        <div class="energy-item">
                            <span class="energy-label">Potential</span>
                            <div class="energy-bar-container">
                                <div class="energy-bar potential" id="potentialBar"></div>
                            </div>
                            <span class="energy-value" id="potentialValue">0</span>
                        </div>
                        <div class="energy-item">
                            <span class="energy-label">Total</span>
                            <div class="energy-bar-container">
                                <div class="energy-bar total" id="totalBar"></div>
                            </div>
                            <span class="energy-value" id="totalValue">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Events, Vector } = Matter;

        // State
        let engine, runner;
        let bob1, bob2, constraint1, constraint2;
        let isPaused = false;
        let trail = [];
        const MAX_TRAIL_LENGTH = 500;

        // Parameters
        let params = {
            length1: 120,
            length2: 120,
            mass1: 20,
            mass2: 20,
            angle1: 90,
            angle2: 90,
            gravity: 1,
            speed: 1
        };

        // Canvas setup
        const canvas = document.getElementById('pendulumCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        function getPivot() {
            return { x: canvas.width / 2, y: canvas.height * 0.25 };
        }

        function initPhysics() {
            // Create engine
            engine = Engine.create();
            engine.gravity.y = params.gravity;

            // Create runner
            runner = Runner.create();

            const pivot = getPivot();

            // Calculate initial positions based on angles
            const rad1 = (params.angle1 - 90) * Math.PI / 180;
            const rad2 = (params.angle2 - 90) * Math.PI / 180;

            const x1 = pivot.x + params.length1 * Math.cos(rad1);
            const y1 = pivot.y + params.length1 * Math.sin(rad1);

            const x2 = x1 + params.length2 * Math.cos(rad2);
            const y2 = y1 + params.length2 * Math.sin(rad2);

            // Create bodies
            bob1 = Bodies.circle(x1, y1, Math.sqrt(params.mass1) * 2, {
                mass: params.mass1,
                frictionAir: 0,
                friction: 0,
                restitution: 0
            });

            bob2 = Bodies.circle(x2, y2, Math.sqrt(params.mass2) * 2, {
                mass: params.mass2,
                frictionAir: 0,
                friction: 0,
                restitution: 0
            });

            // Create constraints
            constraint1 = Constraint.create({
                pointA: pivot,
                bodyB: bob1,
                length: params.length1,
                stiffness: 1,
                damping: 0
            });

            constraint2 = Constraint.create({
                bodyA: bob1,
                bodyB: bob2,
                length: params.length2,
                stiffness: 1,
                damping: 0
            });

            // Add to world
            Composite.add(engine.world, [bob1, bob2, constraint1, constraint2]);

            // Start runner
            Runner.run(runner, engine);
        }

        function clearPhysics() {
            if (runner) Runner.stop(runner);
            if (engine) Engine.clear(engine);
        }

        function reset() {
            trail = [];
            clearPhysics();
            initPhysics();
            isPaused = false;
            document.getElementById('pauseBtn').textContent = 'Pause';
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                runner.enabled = false;
                document.getElementById('pauseBtn').textContent = 'Resume';
                document.getElementById('pauseBtn').classList.add('active');
            } else {
                runner.enabled = true;
                document.getElementById('pauseBtn').textContent = 'Pause';
                document.getElementById('pauseBtn').classList.remove('active');
            }
        }

        function updateGravity() {
            engine.gravity.y = params.gravity;
        }

        function updateSpeed() {
            engine.timing.timeScale = params.speed;
        }

        function calculateEnergy() {
            if (!bob1 || !bob2) return { kinetic: 0, potential: 0, total: 0 };

            const pivot = getPivot();
            const g = params.gravity * 0.001; // Scale for Matter.js units

            // Kinetic energy: 0.5 * m * v^2
            const v1 = Vector.magnitude(bob1.velocity);
            const v2 = Vector.magnitude(bob2.velocity);
            const kinetic = 0.5 * bob1.mass * v1 * v1 + 0.5 * bob2.mass * v2 * v2;

            // Potential energy: m * g * h (height from pivot)
            const h1 = bob1.position.y - pivot.y;
            const h2 = bob2.position.y - pivot.y;
            const potential = -(bob1.mass * g * h1 + bob2.mass * g * h2) * 100;

            return {
                kinetic: Math.max(0, kinetic),
                potential: potential,
                total: kinetic + potential
            };
        }

        function updateEnergyDisplay() {
            const energy = calculateEnergy();
            const maxEnergy = Math.max(energy.kinetic + Math.abs(energy.potential), 1);

            const kineticPercent = (energy.kinetic / maxEnergy) * 100;
            const potentialPercent = (Math.abs(energy.potential) / maxEnergy) * 100;
            const totalPercent = Math.min((energy.total / maxEnergy) * 100, 100);

            document.getElementById('kineticBar').style.width = `${kineticPercent}%`;
            document.getElementById('potentialBar').style.width = `${potentialPercent}%`;
            document.getElementById('totalBar').style.width = `${Math.max(0, totalPercent)}%`;

            document.getElementById('kineticValue').textContent = Math.round(energy.kinetic);
            document.getElementById('potentialValue').textContent = Math.round(energy.potential);
            document.getElementById('totalValue').textContent = Math.round(energy.total);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(15, 15, 26, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!bob1 || !bob2) return;

            const pivot = getPivot();

            // Update trail
            if (!isPaused) {
                trail.push({ x: bob2.position.x, y: bob2.position.y });
                if (trail.length > MAX_TRAIL_LENGTH) {
                    trail.shift();
                }
            }

            // Draw trail with gradient
            if (trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    ctx.lineTo(trail[i].x, trail[i].y);
                }
                ctx.strokeStyle = 'rgba(255, 107, 107, 0.8)';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // Draw fading effect
                for (let i = 0; i < trail.length - 1; i++) {
                    const alpha = i / trail.length;
                    const hue = 0 + (alpha * 60); // Red to yellow
                    ctx.beginPath();
                    ctx.moveTo(trail[i].x, trail[i].y);
                    ctx.lineTo(trail[i + 1].x, trail[i + 1].y);
                    ctx.strokeStyle = `hsla(${hue}, 100%, 65%, ${alpha})`;
                    ctx.lineWidth = 1 + alpha * 2;
                    ctx.stroke();
                }
            }

            // Draw pivot
            ctx.beginPath();
            ctx.arc(pivot.x, pivot.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#666';
            ctx.fill();

            // Draw arms
            ctx.beginPath();
            ctx.moveTo(pivot.x, pivot.y);
            ctx.lineTo(bob1.position.x, bob1.position.y);
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(bob1.position.x, bob1.position.y);
            ctx.lineTo(bob2.position.x, bob2.position.y);
            ctx.stroke();

            // Draw bob1
            ctx.beginPath();
            ctx.arc(bob1.position.x, bob1.position.y, Math.sqrt(params.mass1) * 2, 0, Math.PI * 2);
            const gradient1 = ctx.createRadialGradient(
                bob1.position.x - 3, bob1.position.y - 3, 0,
                bob1.position.x, bob1.position.y, Math.sqrt(params.mass1) * 2
            );
            gradient1.addColorStop(0, '#48dbfb');
            gradient1.addColorStop(1, '#0abde3');
            ctx.fillStyle = gradient1;
            ctx.fill();

            // Draw bob2
            ctx.beginPath();
            ctx.arc(bob2.position.x, bob2.position.y, Math.sqrt(params.mass2) * 2, 0, Math.PI * 2);
            const gradient2 = ctx.createRadialGradient(
                bob2.position.x - 3, bob2.position.y - 3, 0,
                bob2.position.x, bob2.position.y, Math.sqrt(params.mass2) * 2
            );
            gradient2.addColorStop(0, '#ff6b6b');
            gradient2.addColorStop(1, '#ee5a5a');
            ctx.fillStyle = gradient2;
            ctx.fill();

            // Update energy display
            updateEnergyDisplay();

            requestAnimationFrame(draw);
        }

        // Event listeners for controls
        function setupControls() {
            const controls = ['length1', 'length2', 'mass1', 'mass2', 'angle1', 'angle2', 'gravity', 'speed'];

            controls.forEach(id => {
                const input = document.getElementById(id);
                const valueSpan = document.getElementById(id + 'Value');

                input.addEventListener('input', () => {
                    const value = parseFloat(input.value);
                    params[id] = value;

                    if (id === 'angle1' || id === 'angle2') {
                        valueSpan.textContent = value + '°';
                    } else if (id === 'speed') {
                        valueSpan.textContent = value.toFixed(1) + 'x';
                    } else if (id === 'gravity') {
                        valueSpan.textContent = value.toFixed(1);
                    } else {
                        valueSpan.textContent = value;
                    }

                    if (id === 'gravity') {
                        updateGravity();
                    } else if (id === 'speed') {
                        updateSpeed();
                    }
                });
            });

            document.getElementById('pauseBtn').addEventListener('click', togglePause);
            document.getElementById('resetBtn').addEventListener('click', reset);
            document.getElementById('clearTrailBtn').addEventListener('click', () => { trail = []; });
        }

        // Handle resize
        window.addEventListener('resize', () => {
            resizeCanvas();
            // Update pivot position in constraint
            if (constraint1) {
                constraint1.pointA = getPivot();
            }
        });

        // Initialize
        resizeCanvas();
        setupControls();
        initPhysics();
        draw();
    </script>
</body>
</html>
